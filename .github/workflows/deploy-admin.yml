name: Deploy Sticker Admin

on:
  push:
    branches: [main]
    paths:
      - 'admin-panel/**'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sticker-admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-panel
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VPS_TRAINING_URL: ${{ secrets.VPS_TRAINING_API_URL }}
          VPS_TRAINING_KEY: ${{ secrets.VPS_TRAINING_API_KEY }}
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
          AVISA_API_URL: ${{ secrets.AVISA_API_URL }}
          AVISA_API_TOKEN: ${{ secrets.AVISA_API_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SUPABASE_URL,SUPABASE_KEY,SUPABASE_SERVICE_KEY,VPS_TRAINING_URL,VPS_TRAINING_KEY,EVOLUTION_API_URL,EVOLUTION_API_KEY,EVOLUTION_INSTANCE,AVISA_API_URL,AVISA_API_TOKEN
          script: |
            echo "Logging into GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Checking if service exists..."
            if docker service ls | grep -q sticker_admin; then
              echo "Updating existing service..."
              docker service update \
                --with-registry-auth \
                --env-add NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL" \
                --env-add NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPABASE_KEY" \
                --env-add SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_KEY" \
                --env-add VPS_TRAINING_API_URL="$VPS_TRAINING_URL" \
                --env-add VPS_TRAINING_API_KEY="$VPS_TRAINING_KEY" \
                --env-add EVOLUTION_API_URL="$EVOLUTION_API_URL" \
                --env-add EVOLUTION_API_KEY="$EVOLUTION_API_KEY" \
                --env-add EVOLUTION_INSTANCE="$EVOLUTION_INSTANCE" \
                --env-add AVISA_API_URL="$AVISA_API_URL" \
                --env-add AVISA_API_TOKEN="$AVISA_API_TOKEN" \
                --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
                sticker_admin
            else
              echo "Creating new service..."
              docker service create \
                --name sticker_admin \
                --network traefik-public \
                --replicas 1 \
                --with-registry-auth \
                --env NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL" \
                --env NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPABASE_KEY" \
                --env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_KEY" \
                --env VPS_TRAINING_API_URL="$VPS_TRAINING_URL" \
                --env VPS_TRAINING_API_KEY="$VPS_TRAINING_KEY" \
                --env EVOLUTION_API_URL="$EVOLUTION_API_URL" \
                --env EVOLUTION_API_KEY="$EVOLUTION_API_KEY" \
                --env EVOLUTION_INSTANCE="$EVOLUTION_INSTANCE" \
                --env AVISA_API_URL="$AVISA_API_URL" \
                --env AVISA_API_TOKEN="$AVISA_API_TOKEN" \
                --label traefik.enable=true \
                --label "traefik.http.routers.sticker-admin.rule=Host(\`admin-stickers.ytem.com.br\`)" \
                --label traefik.http.routers.sticker-admin.entrypoints=websecure \
                --label traefik.http.routers.sticker-admin.tls=true \
                --label traefik.http.routers.sticker-admin.tls.certresolver=letsencrypt \
                --label traefik.http.services.sticker-admin.loadbalancer.server.port=3000 \
                --constraint 'node.role == manager' \
                ${{ env.IMAGE_NAME }}:${{ github.sha }}
            fi

            echo "Verifying deployment..."
            sleep 10
            docker service ps sticker_admin --filter "desired-state=running" --format "{{.CurrentState}}"

      - name: Notify success
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "URL: https://admin-stickers.ytem.com.br"
