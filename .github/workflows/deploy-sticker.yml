name: Deploy Sticker Bot

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package*.json'
      - 'tsconfig.json'

  # Permite deploy manual via GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/stickerbot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy Backend to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔄 Deploying backend..."
            docker service update \
              --with-registry-auth \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              sticker_backend

            echo "⏳ Waiting for backend to be healthy..."
            sleep 30

            echo "✅ Verifying backend deployment..."
            docker service ps sticker_backend --filter "desired-state=running" --format "{{.CurrentState}}"

      - name: Deploy Worker to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔄 Deploying worker..."
            docker service update \
              --with-registry-auth \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              sticker_worker

            echo "✅ Verifying worker deployment..."
            docker service ps sticker_worker --filter "desired-state=running" --format "{{.CurrentState}}"

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          sleep 10
          curl --fail https://stickers.ytem.com.br/health || exit 1
          echo "✅ Health check passed!"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "❌ Deployment failed! Rolling back..."
            docker service update --rollback sticker_backend
            docker service update --rollback sticker_worker
            echo "↩️ Rollback completed"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "🌐 URL: https://stickers.ytem.com.br"
