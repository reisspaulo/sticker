name: Deploy Sticker Bot

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package*.json'
      - 'tsconfig.json'

  # Permite deploy manual via GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/stickerbot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Documentation
        run: |
          echo "🔍 Validating documentation..."
          npm run validate:docs
          echo "✅ Documentation validation passed!"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            DEPLOYED_AT=${{ github.event.head_commit.timestamp }}
          no-cache: true
          labels: ${{ steps.meta.outputs.labels }}

      - name: Login to GHCR on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔐 Logging into GitHub Container Registry..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "✅ Docker login successful"

      - name: Deploy Backend to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔄 Deploying backend..."
            docker service update \
              --with-registry-auth \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              sticker_backend

            echo "⏳ Waiting for backend to be healthy..."
            sleep 30

            echo "✅ Verifying backend deployment..."
            docker service ps sticker_backend --filter "desired-state=running" --format "{{.CurrentState}}"

      - name: Deploy Worker to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔄 Deploying worker..."
            docker service update \
              --with-registry-auth \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              sticker_worker

            echo "✅ Verifying worker deployment..."
            docker service ps sticker_worker --filter "desired-state=running" --format "{{.CurrentState}}"

      - name: Health check and version verification
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🏥 Running health check via localhost..."
            sleep 10

            # Get container ID for backend
            CONTAINER_ID=$(docker ps --filter name=sticker_backend -q | head -1)
            if [ -z "$CONTAINER_ID" ]; then
              echo "❌ Backend container not found!"
              exit 1
            fi

            # Health check via container exec (bypasses external firewall/proxy)
            HEALTH_RESPONSE=$(docker exec $CONTAINER_ID node -e "fetch('http://localhost:3000/health').then(r=>r.text()).then(d=>console.log(d))")
            echo "Health response: $HEALTH_RESPONSE"

            # Check if healthy
            STATUS=$(echo $HEALTH_RESPONSE | jq -r '.status')
            if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "degraded" ]; then
              echo "❌ Health check failed! Status: $STATUS"
              exit 1
            fi

            # Verify deployed commit SHA matches
            DEPLOYED_SHA=$(echo $HEALTH_RESPONSE | jq -r '.git_sha')
            EXPECTED_SHA="${{ github.sha }}"

            echo "📦 Expected SHA: $EXPECTED_SHA"
            echo "🚀 Deployed SHA: $DEPLOYED_SHA"

            if [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ]; then
              echo "⚠️ WARNING: Deployed version ($DEPLOYED_SHA) does not match expected ($EXPECTED_SHA)"
              echo "This may indicate the deploy did not complete correctly."
              sleep 30
              HEALTH_RESPONSE=$(docker exec $CONTAINER_ID node -e "fetch('http://localhost:3000/health').then(r=>r.text()).then(d=>console.log(d))")
              DEPLOYED_SHA=$(echo $HEALTH_RESPONSE | jq -r '.git_sha')
              if [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ]; then
                echo "❌ CRITICAL: Version mismatch persists after retry!"
                exit 1
              fi
            fi

            echo "✅ Health check passed! Correct version deployed."

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "❌ Deployment failed! Rolling back..."
            docker service update --rollback sticker_backend
            docker service update --rollback sticker_worker
            echo "↩️ Rollback completed"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "🌐 URL: https://your-domain.com"
