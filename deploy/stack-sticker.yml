version: "3.9"

networks:
  traefik-public:
    external: true
  ytem-backend:
    external: true

services:
  # Backend API
  backend:
    image: ghcr.io/reisspaulo/stickerbot:latest
    command: ["node", "dist/server.js"]
    environment:
      # Environment
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Secrets from Doppler
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_URL=redis://ytem-databases_redis:6379
      - EVOLUTION_API_URL=http://evolution_evolution_api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}

    networks:
      - traefik-public  # SSL routing via Traefik
      - ytem-backend    # Access to Redis
    deploy:
      replicas: 2  # ← 2 réplicas para zero downtime
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1        # Atualiza 1 container por vez
        delay: 10s            # Aguarda 10s entre atualizações
        failure_action: rollback  # Rollback automático se falhar
        monitor: 30s          # Monitora por 30s antes de considerar sucesso
        max_failure_ratio: 0.3  # Tolera até 30% de falhas
        order: start-first    # Inicia novo ANTES de parar antigo (zero downtime!)
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 40s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.sticker-api.rule=Host(`stickers.ytem.com.br`)"
        - "traefik.http.routers.sticker-api.entrypoints=websecure"
        - "traefik.http.routers.sticker-api.tls=true"
        - "traefik.http.routers.sticker-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.sticker-api.loadbalancer.server.port=3000"
        - "traefik.http.services.sticker-api.loadbalancer.healthcheck.path=/health"
        - "traefik.http.services.sticker-api.loadbalancer.healthcheck.interval=30s"
        # Router para fig.ytem.com.br (URL shortener/tracking)
        - "traefik.http.routers.sticker-links.rule=Host(`fig.ytem.com.br`)"
        - "traefik.http.routers.sticker-links.entrypoints=websecure"
        - "traefik.http.routers.sticker-links.tls=true"
        - "traefik.http.routers.sticker-links.tls.certresolver=letsencrypt"
        - "traefik.http.routers.sticker-links.service=sticker-api"

  # Worker (BullMQ processor)
  worker:
    image: ghcr.io/reisspaulo/stickerbot:latest
    command: ["node", "dist/worker.js"]
    environment:
      # Environment
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Secrets from Doppler
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_URL=redis://ytem-databases_redis:6379
      - EVOLUTION_API_URL=http://evolution_evolution_api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}

    networks:
      - traefik-public  # Access to Evolution API
      - ytem-backend    # Access to Redis
    deploy:
      replicas: 2  # ← 2 workers para processar mais jobs em paralelo
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1        # Atualiza 1 worker por vez
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
        order: start-first    # Não para de processar jobs durante deploy
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M  # Higher for image/video processing
        reservations:
          cpus: '0.25'
          memory: 256M
